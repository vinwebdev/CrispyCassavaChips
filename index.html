<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elena's Crispy Cassava Chips</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.3/css/all.css">
    <link rel="stylesheet" href="/Vin/Project_CassavaChips/css/style.css">
</head>

<body>

<div class="container">  

    <!-- LOGO -->
    <div class="logo-container">
        <div class="header-bar"></div>              
        <img src="/Vin/Project_CassavaChips/image/Elenas_Cassava_Chips_Logo.png" class="Logo-main">
    </div>

    <!-- CARDS -->
    <div class="card-wrapper">

        <div class="card">
            <img src="/Vin/Project_CassavaChips/image/bg-SourcreamFlavor.png" class="card-img">
            <img src="/Vin/Project_CassavaChips/image/logo-flavorsourcream.png" class="flavor-img">
            <h1 class="flavor_name">Sour Cream</h1>
            <p class="about">🥛 A snack you’ll fall in love with...</p>
            <hr class="h_line">
            <button class="btn" onclick="openModal('Sour Cream')">Click to Order</button>
        </div>

        <div class="card">
            <img src="/Vin/Project_CassavaChips/image/bg-CheeseFlavor.png" class="card-img">
            <img src="/Vin/Project_CassavaChips/image/logo-flavorcheese.png" class="flavor-img">
            <h1 class="flavor_name">Cheese</h1>                  
            <p class="about">🧀 Packed with creamy cheesy goodness...</p>
            <hr class="h_line">                  
            <button class="btn" onclick="openModal('Cheese')">Click to Order</button>
        </div>

        <div class="card">
            <img src="/Vin/Project_CassavaChips/image/bg-BBQFlavor.png" class="card-img">
            <img src="/Vin/Project_CassavaChips/image/logo-flavorbbq.png" class="flavor-img">
            <h1 class="flavor_name">Barbeque</h1>        
            <p class="about">🔥 Smoky, bold, delicious...</p>
            <hr class="h_line">
            <button class="btn" onclick="openModal('BBQ')">Click to Order</button>
        </div>

    </div>

    <!-- ORDER BUTTON (AFTER CARDS ✅) 
    <div class="total_checkoutbtn">
        <button class="btn_checkout" onclick="checkoutMessenger()">Order via Messenger</button>
    </div>
    -->

    <!-- MODAL -->
<div id="checkoutModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2><i class="fas fa-info-circle"></i>  Details</h2>

        <!-- CUSTOMER INFO -->
        <div class="form-group">
            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="phone" placeholder="Phone Number">
            <input type="text" id="address" placeholder="Delivery Address">
        </div>

        <!-- BUTTONS -->
        <div class="modal-actions">
            <button class="btn_checkout" onclick="checkoutMessenger()">
                Order via Messenger
            </button>
        </div>
            <a href="tel:9756158093" class="quick-call">
                Quick Order :  &nbsp;<i class="fas fa-phone"></i>&nbsp;  0975 615 8093
            </a>
    </div>
</div>
<!-- FLOATING ORDER BUTTON -->
    <!--
        <a href="https://m.me/marvin.gonzales.528?ref=Hi%20I%20want%20to%20order%20Cassava%20Chips" target="_blank" class="floating-order-btn">
        <i class="fab fa-facebook-messenger"></i>
        -->
    <a class="floating-order-btn"><i class="fab fa-facebook-messenger"></i> <span onclick="openModal()">Order Now</span> </a>
     
</a>
 <!-- FOOTER -->
<footer class="footer">
    <p>Powered by: <span><a href="https://vinwebdev.github.io/vinCV.github.io/" class="Portpolio">VinTech</a></span> | @ 2026 All right reserved.</p>
</footer>

<script>

let cart = JSON.parse(localStorage.getItem('cart')) || [];

// SAVE CART
function saveCart() {
    localStorage.setItem('cart', JSON.stringify(cart));
}

let selectedItem = "";

// OPEN MODAL
function openModal(flavor) {
    selectedItem = flavor;

    document.getElementById("checkoutModal").style.display = "block";
    document.getElementById("selectedFlavor").innerText = "Flavor: " + flavor;
}

// CLOSE MODAL
function closeModal() {
    document.getElementById("checkoutModal").style.display = "none";
}

// SEND TO MESSENGER
function checkoutMessenger() {

    let name = document.getElementById('name').value;
    let phone = document.getElementById('phone').value;
    let address = document.getElementById('address').value;

    let message = `🛒 *NEW ORDER* 🛒\n\n`;
    message += `📦 Flavor: ${selectedItem}\n\n`;
    message += `👤 Name: ${name}\n`;
    message += `📞 Phone: ${phone}\n`;
    message += `🏠 Address: ${address}\n`;

    let page = 'marvin.gonzales.528';
    let url = `https://m.me/${page}?ref=${encodeURIComponent(message)}`;

    window.open(url, '_blank');

    closeModal();
}
</script>

</body>
</html>
